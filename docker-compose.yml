services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cryptotoolbox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - cryptotoolbox_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cryptotoolbox"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: http://localhost:3000
      APP_ORIGIN: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cryptotoolbox
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL: "false"
      SESSION_SECRET: ${SESSION_SECRET:-dev-local-change-this-session-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PIN: ${ADMIN_PIN:-}
      COOKIE_SECURE: "false"
      FORCE_HTTPS: "false"
    ports:
      - "3000:3000"

volumes:
  cryptotoolbox_postgres_data:
