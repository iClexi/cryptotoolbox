<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CryptoToolbox verifica integridad de archivos con MD5, SHA1 y SHA256 sobre HTTPS." />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>CryptoToolbox</title>
    <style>
      #html-brand-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(5, 5, 5, 0.92);
        color: #ffffff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #html-brand-header img {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: #ffffff;
        padding: 7px;
      }

      #html-brand-header strong {
        display: block;
        font-size: 15px;
        line-height: 1;
      }

      #html-brand-header span {
        display: block;
        margin-top: 4px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.48);
      }
    </style>
  </head>
  <body>
    <header id="html-brand-header" aria-label="CryptoToolbox">
      <img src="/logo.png" alt="CryptoToolbox" />
      <div>
        <strong>CryptoToolbox</strong>
        <span>cryptotoolbox.iclexi.tech</span>
      </div>
    </header>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
